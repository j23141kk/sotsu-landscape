<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>プロトタイプ (地図＋周辺スポット連動)</title>
        
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>

        <div class="phone-container">
            <header>
                Landscape Translation System
            </header>

            <main>
                <section class="card">
                    <div class="card-title">LIVE MAP</div>
                    <div class="map-area">
                        <div id="map"></div>
                    </div>
                </section>
                
                <section class="card">
                    <div class="card-title">NEARBY SPOTS</div>
                    <div class="spots-carousel" id="spotsCarousel">
                    </div>
                </section>
                
                <section class="card">
                    <div class="card-title">LANDSCAPE TRANSLATION</div>
                    <div class="translation-text" id="translationText">
                        走行中...。歴史や文化のあるスポットに近づくと、ここに自動で『風景翻訳』のテキストが表示されます。
                    </div>
                </section>

                <section class="card">
                    <div class="card-title">BGM SUGGESTION</div>
                    <div class="music-player">
                        <div class="album-art">🎵</div>
                        <div class="track-info">
                            <div class="track-title">Brick Quarter Nostalgia</div>
                            <div class="track-artist">Ambient Synced Track</div>
                        </div>
                        <div class="player-controls">
                            ▶️
                        </div>
                    </div>
                </section>
            </main>

            <footer>
                J23141 Graduation Research Project Prototype
            </footer>
        </div>

        <script src="app.js"></script>
    </body>
</html>
