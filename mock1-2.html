<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>モックアップ1-2 (周辺スポット連動)</title>
        <style>
            :root {
                --bg-color: #f4f6f9;
                --card-bg: #ffffff;
                --text-main: #333333;
                --accent-color: #60c9ec;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
            }

            /* スマホ向けのコンテナ */
            .phone-container {
                width: 100%;
                max-width: 414px; 
                height: 896px;
                background: var(--card-bg);
                box-shadow: 0 4px 24px rgba(0,0,0,0.1);
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                position: relative;
            }

            /* ヘッダー */
            header {
                background-color: var(--accent-color);
                color: white;
                padding: 16px;
                text-align: center;
                font-size: 1.1rem;
                font-weight: bold;
                position: sticky;
                top: 0;
                z-index: 10;
            }

            /* メインコンテンツエリア */
            main {
                padding: 16px;
                display: flex;
                flex-direction: column;
                gap: 16px;
                flex: 1;
            }

            .card {
                background: #fff;
                border-radius: 12px;
                padding: 16px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.05);
                border: 1px solid #eee;
            }

            .card-title {
                font-size: 0.9rem;
                color: #666;
                margin-bottom: 8px;
                font-weight: bold;
            }

            /* マップ・走行環境シミュレータ */
            .map-area {
                height: 200px;
                background: #e5e5e5;
                border-radius: 8px;
                display: flex;
                justify-content: center;
                align-items: center;
                color: #555;
                font-weight: 500;
                position: relative;
                overflow: hidden;
            }

            .map-placeholder {
                text-align: center;
            }

            /* 周辺スポット用のカルーゼル設定 */
            .spots-carousel {
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 12px;
                padding: 4px 0;
                scrollbar-width: none; /* Firefox用 */
            }
            .spots-carousel::-webkit-scrollbar {
                display: none; /* Chrome, Safari用 */
            }

            /* スポットカードのデザイン */
            .spot-card {
                flex: 0 0 80%; /* 次のカードがチラ見えする設定 */
                scroll-snap-align: start;
                background-color: #fafbfc;
                border-radius: 8px;
                padding: 12px;
                border: 1px solid #eaedf1;
                transition: all 0.3s ease;
            }

            /* カテゴリバッジ */
            .spot-category {
                display: inline-block;
                font-size: 0.7rem;
                font-weight: bold;
                padding: 2px 6px;
                border-radius: 4px;
                margin-bottom: 6px;
            }
            .cat-歴史 { background: #efebe9; color: #5d4037; }
            .cat-自然 { background: #e8f5e9; color: #2e7d32; }
            .cat-景勝地 { background: #e3f2fd; color: #1565c0; }
            .cat-グルメ { background: #ffe7e0; color: #ef4000; }
            .cat-道の駅 { background: #f3e5f5; color: #7b1fa2; }
            .cat-施設 { background: #e0f7fa; color: #006064; }
            .cat-なし { background: #f5f5f5; color: #9e9e9e; }

            .spot-name {
                font-size: 0.95rem;
                font-weight: bold;
                color: #333;
                margin-bottom: 4px;
            }

            .spot-distance {
                font-size: 0.8rem;
                color: #888;
            }

            /* 風景翻訳テキスト表示 */
            .translation-text {
                font-size: 1.1rem;
                line-height: 1.6;
                color: var(--text-main);
                min-height: 80px;
            }

            /* 音楽プレイヤー */
            .music-player {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .album-art {
                width: 50px;
                height: 50px;
                background: #ccc;
                border-radius: 6px;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 0.8rem;
            }

            .track-info {
                flex: 1;
            }

            .track-title {
                font-weight: bold;
                font-size: 0.95rem;
                margin-bottom: 2px;
            }

            .track-artist {
                font-size: 0.8rem;
                color: #777;
            }

            .player-controls {
                font-size: 1.5rem;
                cursor: pointer;
            }

            /* フッター・ナビゲーション */
            footer {
                padding: 12px;
                text-align: center;
                font-size: 0.8rem;
                color: #999;
                border-top: 1px solid #eee;
            }
        </style>
    </head>
    <body>

        <div class="phone-container">
            <header>
                Landscape Translation System
            </header>

            <main>
                <section class="card">
                    <div class="card-title">LIVE MAP</div>
                    <div class="map-area">
                        <div class="map-placeholder">
                            📍 走行ルート表示エリア<br>
                            <span style="font-size: 0.8rem; color: #888;">（マップを同期）</span>
                        </div>
                    </div>
                </section>
                
                <section class="card">
                    <div class="card-title">NEARBY SPOTS</div>
                    <div class="spots-carousel" id="spotsCarousel">
                        </div>
                </section>
                
                <section class="card">
                    <div class="card-title">LANDSCAPE TRANSLATION</div>
                    <div class="translation-text" id="translationText">
                        走行中...。歴史や文化のあるスポットに近づくと、ここに自動で『風景翻訳』のテキストが表示されます。
                    </div>
                </section>

                <section class="card">
                    <div class="card-title">BGM SUGGESTION</div>
                    <div class="music-player">
                        <div class="album-art">🎵</div>
                        <div class="track-info">
                            <div class="track-title">Brick Quarter Nostalgia</div>
                            <div class="track-artist">Ambient Synced Track</div>
                        </div>
                        <div class="player-controls">
                            ▶️
                        </div>
                    </div>
                </section>
            </main>

            <footer>
                J23141 Graduation Research Project Prototype
            </footer>
        </div>

        <script>
            // 1. 各地点のデータ（風景翻訳テキスト ＋ 周辺スポット3つのリスト）
            const translationPoints = [
                {
                    name: "東京情報大学5号館",
                    lat: 35.6369279,
                    lng: 140.2020905,
                    radius: 100,
                    text: "【東京情報大学付近を走行中】ここは東京情報大学5号館です。木曜のマッキンゼミはここで開催されます。",
                    // この地点に入ったときに表示する周辺スポット3つ
                    spots: [
                        { category: "施設", name: "情報大 5号館講義室", distance: "0m" },
                        { category: "グルメ", name: "学食（ポプラ）", distance: "120m" },
                        { category: "施設", name: "情報大 本部棟図書館", distance: "250m" }
                    ]
                },
                {
                    name: "自宅",
                    lat: 35.508572, 
                    lng: 140.071769, 
                    radius: 100,
                    text: "かのちゃん家。",
                    spots: [
                        { category: "歴史", name: "姉崎二子塚古墳", distance: "4.7km" },
                        { category: "グルメ", name: "田中屋", distance: "1.7km" },
                        { category: "道の駅", name: "道の駅 あずの里・いちはら", distance: "7.6km" }
                    ]
                },
                {
                    name: "地点C（ゴール周辺）",
                    lat: 35.671989, 
                    lng: 139.764632, 
                    radius: 100,
                    text: "【地点C付近を走行中】目的地周辺の繁華街に入りました。ここは近代化の先駆けとなった場所で、レトロな西洋建築と現代のビルが融合した独特の景観が特徴です。",
                    spots: [
                        { category: "景勝地", name: "ガス灯通りの洋館", distance: "80m" },
                        { category: "グルメ", name: "老舗の喫茶ブラン", distance: "150m" },
                        { category: "歴史", name: "近代建築記念碑", distance: "320m" }
                    ]
                }
            ];

            // どの地点の範囲内にも入っていない時のデフォルト表示データ
            const defaultText = "走行中...。歴史や文化のあるスポットに近づくと、ここに自動で『風景翻訳』のテキストが表示されます。";
            const defaultSpots = [
                { category: "なし", name: "周辺情報はありません", distance: "- m" },
                { category: "なし", name: "周辺情報はありません", distance: "- m" },
                { category: "なし", name: "周辺情報はありません", distance: "- m" }
            ];

            // 2点間の直線距離（メートル）を計算する関数
            function getDistance(lat1, lng1, lat2, lng2) {
                const R = 6371000;
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLng = (lng2 - lng1) * Math.PI / 180;
                const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                        Math.sin(dLng / 2) * Math.sin(dLng / 2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            }

            // 周辺スポット（NEARBY SPOTS）のHTMLを書き換える関数
            function updateSpotsCarousel(spotsArray) {
                const carousel = document.getElementById('spotsCarousel');
                if (!carousel) return;

                let htmlContent = '';
                spotsArray.forEach(spot => {
                    htmlContent += `
                        <div class="spot-card" style="${spot.category === 'なし' ? 'opacity: 0.5;' : ''}">
                            <span class="spot-category cat-${spot.category}">${spot.category}</span>
                            <div class="spot-name">${spot.name}</div>
                            <div class="spot-distance">📍 ${spot.distance}</div>
                        </div>
                    `;
                });
                carousel.innerHTML = htmlContent;
            }

            // 現在地をチェックして画面をアップデートするメイン処理
            function checkLocation(position) {
                const currentLat = position.coords.latitude;
                const currentLng = position.coords.longitude;

                // LIVE MAPエリアの座標を更新
                const mapPlaceholder = document.querySelector('.map-placeholder');
                if (mapPlaceholder) {
                    mapPlaceholder.innerHTML = `📍 GPS信号受信中<br><span style="font-size: 0.8rem; color: #666;">Lat: ${currentLat.toFixed(6)}<br>Lng: ${currentLng.toFixed(6)}</span>`;
                }

                let matchedText = defaultText;
                let matchedSpots = defaultSpots;

                // 登録地点のチェック
                for (const point of translationPoints) {
                    const distance = getDistance(currentLat, currentLng, point.lat, point.lng);
                    
                    if (distance <= point.radius) {
                        matchedText = point.text;
                        matchedSpots = point.spots;
                        break;
                    }
                }

                // 画面への出力反映
                document.getElementById('translationText').textContent = matchedText;
                updateSpotsCarousel(matchedSpots);
            }

            // エラーハンドリング
            function handleError(error) {
                console.error("GPSエラー:", error);
                document.getElementById('translationText').textContent = "GPSの取得に失敗しました。位置情報サービスが許可されているか確認してください。";
            }

            // ページ読み込み時の初期化
            window.onload = function() {
                // 最初にデフォルトの空スポットを表示しておく
                updateSpotsCarousel(defaultSpots);

                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition(checkLocation, handleError, {
                        enableHighAccuracy: true,
                        maximumAge: 0,
                        timeout: 5000
                    });
                } else {
                    alert("このブラウザは位置情報（GPS）に対応していません。");
                }
            };
        </script>
    </body>
</html>
